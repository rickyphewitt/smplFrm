<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>smplFrm</title>
    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- OSS Icons from https://github.com/iconoir-icons/iconoir/blob/main/README.md-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@main/css/iconoir.css" />
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>

<body>
<div class="progress-bar" id="progress-bar"></div>
<div class="top-bar" id="top-bar">
    <div class="text-box small-font third-column" id="top-left-box">
        <div class="logo-icon" id="logo-icon">
            <img src="{% static 'favicon.png' %}" alt="smplFrm">
        </div>
    </div>
</div>
<div class="text-box large-font third-column" id="top-center-box"></div>
<div class="text-box small-font third-column" id="top-right-box">
     <div id="spotify-bar" style="display: none;" />
    <div class="info-group">
        <span id="spotify-now-playing" class="spotify-icon-container"></span>
    </div>
</div>
<div id="middle-section" class="text-box">
    <div style="display: flex; align-items: center; gap: 15px; justify-content: center;">
        <div style="width: 60px; height: 60px; background: #667eea; border-radius: 6px; border: 4px solid #333; position: relative; overflow: hidden; flex-shrink: 0;">
            <div style="position: absolute; width: 15px; height: 15px; background: #ffd700; border-radius: 50%; top: 9px; right: 9px;"></div>
            <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 24px; background: #764ba2; clip-path: polygon(0 100%, 0 50%, 30% 30%, 60% 50%, 100% 20%, 100% 100%);"></div>
        </div>
        <div style="font-size: 48px; font-weight: 500; color: white; font-family: 'Inter', sans-serif;">
            <span style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">smpl</span>Frm
        </div>
    </div>
</div>
 <div id="bottom-bar" class="text-box">
    <div class="info-group" id="photo-date-group">
        <span id="photo-date"></span>
    </div>
    <div class="group-separator"></div>
    <div class="info-group" id="current-date-group">
        <span id="current-date"></span>
    </div>
    <div class="group-separator"></div>
    <div class="info-group" id="current-time-group">
        <span id="current-time"></span>
    </div>
    <div class="group-separator"></div>
    <div class="info-group" id="weather-group">
        <span id="weather-temp"></span>
    </div>
 </div>
<div id="image-container"></div>

<div class="settings-modal" id="settings-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Settings</h2>
            <button class="close-btn" id="close-modal">&times;</button>
        </div>
        
        <div class="modal-tabs">
            <button class="tab-btn active" data-tab="display">Display</button>
            <button class="tab-btn" data-tab="images">Images</button>
            <button class="tab-btn" data-tab="about">About</button>
        </div>
        
        <div class="tab-content active" id="tab-display">
            <div class="settings-section">
                <h3>Display Options</h3>
                <div class="setting-item">
                    <label for="setting-date">Show Photo Date</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="setting-date" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label for="setting-clock">Show Clock</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="setting-clock" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label for="setting-weather">Show Weather</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="setting-weather" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
        
        <div class="tab-content" id="tab-images">
            <div class="settings-section">
                <h3>Timing</h3>
                <div class="setting-item">
                    <label for="setting-refresh">Refresh Interval</label>
                    <div class="number-input">
                        <input type="number" id="setting-refresh" value="30" min="5" max="300">
                        <span>sec</span>
                    </div>
                </div>
                <div class="setting-item">
                    <label for="setting-transition">Transition Time</label>
                    <div class="number-input">
                        <input type="number" id="setting-transition" value="10" min="1" max="30">
                        <span>sec</span>
                    </div>
                </div>
            </div>
            
            <div class="settings-section">
                <h3>Effects</h3>
                <div class="setting-item">
                    <label for="setting-zoom">Zoom Effect</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="setting-zoom" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label for="setting-transition-type">Transition Type</label>
                    <select id="setting-transition-type" class="select-input">
                        <option value="random">Random</option>
                        <option value="fade">Fade</option>
                        <option value="slide-left">Slide Left</option>
                        <option value="slide-right">Slide Right</option>
                        <option value="zoom">Zoom</option>
                        <option value="none">None</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="tab-content" id="tab-about">
            <div class="settings-section">
                <h3>About smplFrm</h3>
                <p style="color: #aaa; line-height: 1.6;">Digital photoframe for displaying photos on any device that has a web browser.</p>
                <p style="color: #aaa; line-height: 1.6; margin-top: 15px;">
                    <a href="https://github.com/rickyphewitt/smplFrm" target="_blank" style="color: #667eea; text-decoration: none;">View on GitHub</a>
                </p>
            </div>
        </div>
        
        <div class="modal-actions">
            <button class="btn btn-primary" id="save-settings">Save Changes</button>
            <button class="btn btn-secondary" id="cancel-settings">Cancel</button>
        </div>
    </div>
</div>
</body>

<script>
    window.SMPL_CONFIG = {
        transitionInterval: {{transition_interval}},
        refreshInterval: {{refresh_interval}},
        host: '{{host}}',
        port: '{{port}}',
        displayDate: {{display_date}},
        displayClock: {{display_clock}},
        pluginSpotifyEnabled: {{plugin_spotify_enabled}},
        weatherCurrentTemp: '{{weather_current_temp}}',
        imageZoomEffect: {{image_zoom_effect}},
        imageTransitionType: '{{image_transition_type}}'
    };
</script>

<script type="module">
    import { init } from "{% static '/main.js' %}";
    init();
</script>
</html>
