<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmplFrm</title>
    <!-- OSS Icons from https://github.com/iconoir-icons/iconoir/blob/main/README.md-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@main/css/iconoir.css" />
    <style>
        body {
          margin: 0;
          padding: 0;
          background-color: black;
        }
        img {
            display: block;
            margin: auto;
        }

        .main-img {
            position: absolute;
            z-index: 150;
            opacity: 0.0;
        }
        

        #middle-section {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: -webkit-box; /* OLD - iOS 6-, Safari 3.1-6 */
            display: -moz-box; /* OLD - Firefox 19- (buggy but mostly works) */
            display: -ms-flexbox; /* TWEENER - IE 10 */
            display: -webkit-flex; /* NEW - Chrome */
            display: flex; /* NEW, Spec - Opera 12.1, Firefox 20+ */

            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #top-bar {
            position: fixed;
            top: 10px;
            left: 0;
            width: 100%;
            height: 10%; /* Adjust height as needed */
            background-color: black;
            opacity: 0.5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 200;
        }

        #bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 10%; /* Adjust height as needed */
            background-color: black;
            opacity: 0.5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 200;
        }

        .logo-font {
             font-size: 15em;
        }

        .large-font {
             font-size: 2em;
        }
        .small-font {
            font-size: 1em;
        }
        .third-column {
            width: 30%;
        }
        .text-box {
            font-family: Cursive;
            font-style: italic;
            text-align: center;
            color: white;
        }



        # for temp
        .weather-card-future {
            display: inline-block;

        }
        .weather-card-current {
            display: block;

        }
        .weather-card-current p {
            padding: 0px;
            margin: 0px;

        }


        .arrow {
          border: solid white;
          border-width: 0 3px 3px 0;
          display: inline-block;
          padding: 3px;
        }
        .right {
          transform: rotate(-45deg);
          -webkit-transform: rotate(-45deg);
        }

        .left {
          transform: rotate(135deg);
          -webkit-transform: rotate(135deg);
        }

        .up {
          transform: rotate(-135deg);
          -webkit-transform: rotate(-135deg);
        }

        .down {
          transform: rotate(45deg);
          -webkit-transform: rotate(45deg);
        }
        # end for temp

        # for the progress bar
        .progress-container {
            width: 60%;
            background-color: #ddd;
            overflow: hidden;
            position: relative;
            height: 10px;
            clear: both;
        }
        .progress-bar {
            height: 10px;
            width: 100%;
            background-color: black;
            transition: width 1s linear;
            z-index: 200;
            position: fixed;
            opacity: 0.5;

        }
        # end for the progress bar

        # spotify start

        #spotify-now-playing {
            visibility: hidden;
        }
        #spotify-now-playing a {
            color: white;
            text-decoration: none;
        }

        .iconoir-spotify::before {
            display: inline-flex;
        }
        # end spotify




    </style>
</head>

<body>
<div class="progress-bar" id="progress-bar"></div>
<div class="top-bar" id="top-bar">
    <div class="text-box small-font third-column" id="top-left-box">
        <div id="spotify-now-playing"></div>
    </div>
    <div class="text-box large-font third-column" id="top-center-box"></div>
    <div class="text-box third-column" id="top-right-box"></div>
</div>
<div id="middle-section" class="logo-font text-box">smplFrm</div>
 <div id="bottom-bar">
    <div class="text-box large-font third-column" id="bottom-left-box"></div>
    <div class="text-box large-font third-column" id="bottom-center-box"></div>
    <div class="text-box third-column" id="bottom-right-box">
        <div class="weather-wrapper">
            <div class="weather-card-current">
                <div class="weather-icon sun"></div>
                <p class="large-font">{{weather_current_temp}}</p>
                <p class="small-font">{{current_low_temp}}  <i class="arrow down"></i> | {{current_high_temp}}  <i class="arrow up"></i></p>
            </div>
        </div>
    </div>
 </div>
<div id="image-container"></div>
</body>

<script>
    window.SMPL_CONFIG = {
        transitionInterval: {{transition_interval}},
        refreshInterval: {{refresh_interval}},
        host: '{{host}}',
        port: '{{port}}',
        displayDate: {{display_date}},
        displayClock: {{display_clock}},
        pluginSpotifyEnabled: {{plugin_spotify_enabled}}
    };
</script>
{% load static %}
<script src="{% static '/main.js' %}"></script>
</html>
