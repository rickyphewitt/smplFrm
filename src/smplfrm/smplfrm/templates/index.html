<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmplFrm</title>
    <!-- OSS Icons from https://github.com/iconoir-icons/iconoir/blob/main/README.md-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@main/css/iconoir.css" />
    <style>
        body {
          margin: 0;
          padding: 0;
          background-color: black;
          overflow: hidden;
        }
        img {
            display: block;
            margin: auto;
        }

        .main-img {
            position: absolute;
            z-index: 150;
            opacity: 0.0;
            transform-origin: center center;
        }
        
        .zoom-effect {
            animation: zoomIn linear forwards;
        }
        
        @keyframes zoomIn {
            from {
                transform: scale(1);
            }
            to {
                transform: scale(1.2);
            }
        }
        

        #middle-section {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: -webkit-box; /* OLD - iOS 6-, Safari 3.1-6 */
            display: -moz-box; /* OLD - Firefox 19- (buggy but mostly works) */
            display: -ms-flexbox; /* TWEENER - IE 10 */
            display: -webkit-flex; /* NEW - Chrome */
            display: flex; /* NEW, Spec - Opera 12.1, Firefox 20+ */

            justify-content: center;
            align-items: center;
            z-index: 100;
            overflow: hidden;
        }

        #top-bar {
            position: fixed;
            top: 10px;
            left: 0;
            width: 100%;
            height: 10%; /* Adjust height as needed */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 200;
        }

        #bottom-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 15px 60px;
            border-radius: 50px;
            display: flex;
            gap: 50px;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 200;
            max-width: 96%;
            white-space: nowrap;
        }
        
        #spotify-bar {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 12px 30px;
            border-radius: 50px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 200;
            color: white;
            white-space: nowrap;
        }
        
        .info-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .group-separator {
            width: 2px;
            height: 30px;
            background: rgba(255, 255, 255, 0.3);
        }
        
        .info-separator {
            opacity: 0.5;
            margin: 0 -5px;
        }

        .text-box {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            color: white;
            font-size: 20px;
        }

        # for the progress bar
        .progress-container {
            width: 60%;
            background-color: #ddd;
            overflow: hidden;
            position: relative;
            height: 10px;
            clear: both;
        }
        .progress-bar {
            height: 10px;
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            transition: width 1s linear;
            z-index: 200;
            position: fixed;
        }
        # end for the progress bar

        # spotify start

        #spotify-bar a {
            color: white !important;
            text-decoration: none !important;
            cursor: pointer;
        }
        
        #spotify-bar a:hover {
            opacity: 0.8;
            text-decoration: none !important;
        }
        
        #spotify-bar a:visited {
            color: white !important;
            text-decoration: none !important;
        }
        
        #spotify-bar a:link {
            color: white !important;
            text-decoration: none !important;
        }
        
        #spotify-bar a:active {
            color: white !important;
            text-decoration: none !important;
        }
        
        .spotify-icon {
            color: #1DB954;
            font-size: 20px;
        }

        .spotify-icon-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        # end spotify




    </style>
</head>

<body>
<div class="progress-bar" id="progress-bar"></div>
<div class="top-bar" id="top-bar">
    <div class="text-box small-font third-column" id="top-left-box">
         <div id="spotify-bar" style="display: none;" />
    <div class="info-group">
        <span id="spotify-now-playing" class="spotify-icon-container"></span>
    </div>
 </div>
    </div>
    <div class="text-box large-font third-column" id="top-center-box"></div>
    <div class="text-box third-column" id="top-right-box"></div>
</div>
<div id="middle-section" class="text-box">smplFrm</div>
 <div id="bottom-bar" class="text-box">
    <div class="info-group" id="photo-date-group">
        <span id="photo-date"></span>
    </div>
    <div class="group-separator"></div>
    <div class="info-group" id="current-date-group">
        <span id="current-date"></span>
    </div>
    <div class="group-separator"></div>
    <div class="info-group" id="current-time-group">
        <span id="current-time"></span>
    </div>
    <div class="group-separator"></div>
    <div class="info-group" id="weather-group">
        <span id="weather-temp"></span>
    </div>
 </div>
<div id="image-container"></div>
</body>

<script>
    window.SMPL_CONFIG = {
        transitionInterval: {{transition_interval}},
        refreshInterval: {{refresh_interval}},
        host: '{{host}}',
        port: '{{port}}',
        displayDate: {{display_date}},
        displayClock: {{display_clock}},
        pluginSpotifyEnabled: {{plugin_spotify_enabled}},
        weatherCurrentTemp: '{{weather_current_temp}}',
        imageZoomEffect: {{image_zoom_effect}}
    };
</script>
{% load static %}
<script src="{% static '/main.js' %}"></script>
</html>
