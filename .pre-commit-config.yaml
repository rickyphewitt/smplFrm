repos:
  - repo: https://github.com/psf/black
    rev: 26.3.0
    hooks:
      - id: black
  - repo: local
    hooks:
      - id: restage-formatted
        name: restage formatted files
        entry: git add -u
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]